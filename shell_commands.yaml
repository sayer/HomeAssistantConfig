# shell_commands.yaml
write_coach_year: ./update_coach_year.sh {{ year }}
write_coach_number: ./update_coach_number.sh {{ number }}
update_all_dynamic:  bash ./run_update_dynamic.sh
backup_scene_slots: >-
  python3 /config/scene_slot_backup.py '{{ path }}'
restore_scene_slots: >-
  python3 /config/scene_slot_restore.py '{{ path }}' '{{ clear_missing }}'
